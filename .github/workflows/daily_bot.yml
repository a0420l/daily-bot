name: Daily Autonomous Bot

on:
  schedule:
    # Runs at 02:00 UTC (07:30 IST) every day
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: write # Crucial: Grants the bot permission to push commits to the repo

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Python Engine
        run: python bot.py

      - name: Upload Summary as Downloadable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-summary-download
          path: daily_summary.md
          retention-days: 7

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_summary.md
          
          # The diff check prevents the workflow from crashing if data hasn't changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update: Daily Bot Summary" && git push)
